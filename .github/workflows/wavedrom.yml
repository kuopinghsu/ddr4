name: Render WaveDrom diagrams

# Triggers whenever a WaveDrom source JSON is changed, or on manual dispatch.
on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/wavedrom/**.json"
      - ".github/workflows/wavedrom.yml"
  workflow_dispatch:

# Allow the workflow to commit the generated SVGs back to the repo.
permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN; 'contents: write' above is sufficient.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wavedrom-cli
        run: npm install -g wavedrom-cli

      - name: Generate SVGs from WaveDrom JSON sources
        run: bash scripts/gen_wavedrom.sh

      - name: Commit rendered SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/img/
          if git diff --cached --quiet; then
            echo "No SVG changes — nothing to commit."
          else
            git commit -m "ci: render WaveDrom diagrams to SVG [skip ci]"
            git push
          fi
